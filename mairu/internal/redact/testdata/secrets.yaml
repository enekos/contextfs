# Each entry is an input that MUST be redacted.
# `must_not_contain` is the raw secret substring; tests assert it is absent
# from the redacted output. `kind` documents intent only.
- kind: github_pat
  input: 'auth: ghp_1234567890abcdefghijklmnopqrstuvwxyz'
  must_not_contain: 'ghp_1234567890abcdefghijklmnopqrstuvwxyz'
  input_kind: text

- kind: github_fine_grained
  input: 'export GITHUB_TOKEN=github_pat_11ABCDEFG0abcdefghijkl_1234567890abcdefghijklmnopqrstuvwxyz'
  must_not_contain: 'github_pat_11ABCDEFG0abcdefghijkl_1234567890abcdefghijklmnopqrstuvwxyz'
  input_kind: command

- kind: aws_access_key
  input: 'AWS_ACCESS_KEY_ID=AKIAIOSFODNN7EXAMPLE aws s3 ls'
  must_not_contain: 'AKIAIOSFODNN7EXAMPLE'
  input_kind: command

- kind: stripe_live
  input: 'stripe.api_key = "sk_live_4eC39HqLyjWDarjtT1zdp7dcABCDEFGH"'
  must_not_contain: 'sk_live_4eC39HqLyjWDarjtT1zdp7dcABCDEFGH'
  input_kind: text

- kind: slack_bot_token
  input: 'SLACK_BOT=xoxb-12345-67890-AbCdEfGhIjKlMnOpQrStUvWx'
  must_not_contain: 'xoxb-12345-67890-AbCdEfGhIjKlMnOpQrStUvWx'
  input_kind: command

- kind: google_api_key
  input: 'GOOGLE_KEY=AIzaSyD-aBcDeFgHiJkLmNoPqRsTuVwXyZ1234567'
  must_not_contain: 'AIzaSyD-aBcDeFgHiJkLmNoPqRsTuVwXyZ1234567'
  input_kind: command

- kind: jwt
  input: 'curl -H "Authorization: Bearer eyJhbGciOiJIUzI1NiJ9.eyJzdWIiOiIxMjMifQ.SflKxwRJSMeKKF2QT4fwpMeJf36POk6yJV_adQssw5c" /api'
  must_not_contain: 'eyJzdWIiOiIxMjMifQ'
  input_kind: command

- kind: uri_credentials
  input: 'DATABASE_URL=postgres://admin:hunter2supersecret@db.internal/app'
  must_not_contain: 'hunter2supersecret'
  input_kind: command

- kind: pem_key
  input: "config:\n-----BEGIN RSA PRIVATE KEY-----\nMIIEpAIBAAKCAQEAsecret\n-----END RSA PRIVATE KEY-----\nend"
  must_not_contain: 'MIIEpAIBAAKCAQEAsecret'
  input_kind: text

- kind: bearer_header
  input: 'curl -H "Authorization: Bearer abc123randomtoken" https://api.example.com/path'
  must_not_contain: 'abc123randomtoken'
  input_kind: command

- kind: api_key_header
  input: 'curl -H "X-Api-Key: notarealkey12345" https://api.example.com/path'
  must_not_contain: 'notarealkey12345'
  input_kind: command

- kind: basic_auth
  input: 'curl -u admin:hunter2 https://api.example.com/path'
  must_not_contain: 'hunter2'
  input_kind: command

- kind: token_flag
  input: 'deploy --token=abcdefg12345opaquevalue --env=prod --region=us-east-1'
  must_not_contain: 'abcdefg12345opaquevalue'
  input_kind: command

- kind: password_flag_space
  input: 'login --password sekretpasswordvalue --user admin --host production'
  must_not_contain: 'sekretpasswordvalue'
  input_kind: command

- kind: env_prefix
  input: 'API_KEY=leakme_12345supersecretvalue ./deploy.sh production release us-east-1'
  must_not_contain: 'leakme_12345supersecretvalue'
  input_kind: command

- kind: high_entropy
  input: 'webhook secret blob: Zk9Qb1hVazRWdnM5RjE3bUNOZ2hLcw=='
  must_not_contain: 'Zk9Qb1hVazRWdnM5RjE3bUNOZ2hLcw'
  input_kind: text
